apiVersion: v3.0.0
kind: DataContract
id: implements
version: 1.0.0
status: active
name: Implements Asset Master
domain: agricultural-custom-services
tenant: fleet-ops
description:
  purpose: Stable characteristics of attachable implements (related equipment).
  usage: Compatibility filtering, area-rate estimation, material capacity.
servers:
  - server: batch
    type: local
    format: csv
    path: implements.csv
customProperties:
  - property: xOptimization
    value:
      extensionVersion: 0.1.0
      semanticModelRef: urn:xopt:model:agricultural-custom-services:0.1.0
      dataProductRole: assetMaster
      assetRole: implement
      mappingVersion: 1.0.0
      permittedPlanningUses: [periodic-planning, rolling-dispatch]
      defaultQualityPolicyRef: dq://implements/master/v1
schema:
  - name: implements
    logicalType: object
    physicalType: csv
    customProperties:
      - property: schemaGeneration
        value:
          avro:
            namespace: org.example.agri.assets
            recordName: Implement
            recordDoc: "Attachable implement (related equipment). Source dataset: implements.csv."
          proto:
            package: org.example.agri.assets
            messageName: Implement
            syntax: proto3
          es:
            indexName: implements
            dynamic: strict
    properties:
      - name: implement_id
        logicalType: string
        physicalType: string
        required: true
        description: Stable identifier of the implement.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:identity:asset-id, binding: asset.assetId, planningUse: [identity]}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 1}
      - name: implement_type
        logicalType: string
        physicalType: string
        required: true
        description: Source implement category.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:attribute:asset-type, binding: asset.assetType, planningUse: [classification]}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 2}
      - name: compatible_operations
        logicalType: array
        physicalType: string
        required: true
        description: Operation types this implement can perform (stringified list).
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:capability:compatible-operations, binding: asset.capabilities.compatibleOperations, quantityKind: categorical-set, planningUse: [compatibility-filter], missingValuePolicy: reject-for-planning}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 3}
      - name: required_power_kw
        logicalType: number
        physicalType: double
        required: true
        description: Continuous power draw demanded from the prime mover.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:capability:required-power, binding: asset.capabilities.requiredPower, canonicalUnit: kW, quantityKind: power, planningUse: [compatibility-filter], qualityPolicyRef: dq://implements/required-power/v1, missingValuePolicy: reject-for-planning}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 4}
      - name: working_width_m
        logicalType: number
        physicalType: double
        required: true
        description: Working width used for area-rate estimation.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:capability:working-width, binding: asset.capabilities.workingWidth, canonicalUnit: m, quantityKind: length, planningUse: [duration-estimation], missingValuePolicy: reject-for-planning}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 5}
      - name: min_speed_kmh
        logicalType: number
        physicalType: double
        required: true
        description: Minimum operating speed.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:capability:min-operating-speed, binding: asset.capabilities.minOperatingSpeed, canonicalUnit: km/h, quantityKind: speed, planningUse: [duration-estimation], missingValuePolicy: accept-with-warning}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 6}
      - name: max_speed_kmh
        logicalType: number
        physicalType: double
        required: true
        description: Maximum operating speed.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:capability:max-operating-speed, binding: asset.capabilities.maxOperatingSpeed, canonicalUnit: km/h, quantityKind: speed, planningUse: [duration-estimation], missingValuePolicy: accept-with-warning}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 7}
      - name: fertilizer_capacity_kg
        logicalType: number
        physicalType: double
        required: false
        description: Onboard fertilizer capacity.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:capability:fertilizer-capacity, binding: asset.capabilities.fertilizerCapacity, canonicalUnit: kg, quantityKind: mass, planningUse: [capacity], missingValuePolicy: fallback-to-conservative-value}
          - property: fieldGeneration
            value:
              avro: {default: 0.0}
              proto: {fieldNumber: 8}
      - name: depot_id
        logicalType: string
        physicalType: string
        required: true
        description: Home depot reference.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:relationship:home-depot, binding: asset.homeDepotRef, planningUse: [assignment]}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 9}
