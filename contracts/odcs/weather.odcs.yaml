apiVersion: v3.0.0
kind: DataContract
id: weather
version: 1.0.0
status: active
name: Weather Forecasts
domain: agricultural-custom-services
tenant: fleet-ops
description:
  purpose: Forecast values by location and time interval mapped to canonical Forecasts.
  usage: Weather-window feasibility for weather-dependent operations.
servers:
  - server: stream
    type: local
    format: json
    path: weather.json
customProperties:
  - property: xOptimization
    value:
      extensionVersion: 0.1.0
      semanticModelRef: urn:xopt:model:agricultural-custom-services:0.1.0
      dataProductRole: weatherForecasts
      avroSchemaRef: weather.avsc
      mappingVersion: 1.0.0
      permittedPlanningUses: [periodic-planning, rolling-dispatch]
      defaultQualityPolicyRef: dq://weather/forecast/v1
schema:
  - name: weather
    logicalType: object
    physicalType: json
    properties:
      - name: window_id
        logicalType: string
        physicalType: string
        required: true
        description: Stable identifier of the forecast window.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:identity:forecast-id, binding: forecast.forecastId}
      - name: valid_from
        logicalType: date
        physicalType: string
        required: true
        description: ISO-8601 start of the forecast interval.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:time:forecast-from, binding: forecast.forecastFor.from, quantityKind: timestamp}
      - name: valid_to
        logicalType: date
        physicalType: string
        required: true
        description: ISO-8601 end of the forecast interval.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:time:forecast-to, binding: forecast.forecastFor.to, quantityKind: timestamp}
      - name: wind_ms
        logicalType: number
        physicalType: double
        required: true
        description: Sustained wind speed.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:forecast:wind-speed, binding: forecast.value.windSpeed, canonicalUnit: m/s, quantityKind: speed, planningUse: [weather-window], missingValuePolicy: fallback-to-conservative-value}
      - name: rain_mm_per_h
        logicalType: number
        physicalType: double
        required: true
        description: Hourly rainfall.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:forecast:precipitation-rate, binding: forecast.value.precipitationRate, canonicalUnit: mm/h, quantityKind: flow-rate, planningUse: [weather-window], missingValuePolicy: fallback-to-conservative-value}
      - name: soil_moisture_pct
        logicalType: number
        physicalType: double
        required: true
        description: Volumetric soil moisture.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:forecast:soil-moisture, binding: forecast.value.soilMoisture, canonicalUnit: "%", quantityKind: ratio, planningUse: [weather-window], missingValuePolicy: fallback-to-conservative-value}
      - name: lat
        logicalType: number
        physicalType: double
        required: true
        description: Forecast location latitude.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:attribute:latitude, binding: forecast.location.lat, canonicalUnit: deg, quantityKind: angle}
      - name: lon
        logicalType: number
        physicalType: double
        required: true
        description: Forecast location longitude.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:attribute:longitude, binding: forecast.location.lon, canonicalUnit: deg, quantityKind: angle}
