apiVersion: v3.0.0
kind: DataContract
id: execution-events
version: 1.0.0
status: active
name: Execution Events
domain: agricultural-custom-services
tenant: fleet-ops
description:
  purpose: Operational event envelope consumed by the rolling-dispatch stream driver.
  usage: Triggers incremental re-solve in rolling dispatch mode.
servers:
  - server: stream
    type: local
    format: jsonl
    path: events.jsonl
customProperties:
  - property: xOptimization
    value:
      extensionVersion: 0.1.0
      semanticModelRef: urn:xopt:model:agricultural-custom-services:0.1.0
      dataProductRole: executionEvents
      entityKeyField: event_id
      eventTimeField: observed_at
      mappingVersion: 1.0.0
      permittedPlanningUses: [rolling-dispatch]
schema:
  - name: execution-events
    logicalType: object
    physicalType: jsonl
    customProperties:
      - property: schemaGeneration
        value:
          avro:
            namespace: org.example.agri.execution
            recordName: ExecutionEvent
            recordDoc: "Operational event envelope consumed by the rolling-dispatch stream driver. Source dataset: events.jsonl."
          proto:
            package: org.example.agri.execution
            messageName: ExecutionEvent
            syntax: proto3
          es:
            indexName: execution-events
            dynamic: strict
    properties:
      - name: event_id
        logicalType: string
        physicalType: string
        required: true
        description: Stable identifier of the event.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:identity:event-id, binding: event.eventId, planningUse: [identity]}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 1}
      - name: event_type
        logicalType: string
        physicalType: string
        required: true
        description: "Event type: order.created, order.cancelled, task.started, asset.unavailable, forecast.updated."
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:attribute:event-type, binding: event.eventType, planningUse: [replanning-trigger]}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 2}
      - name: observed_at
        logicalType: date
        physicalType: string
        required: true
        description: ISO-8601 time the physical condition was observed.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:time:observed-at, binding: event.observedAt, quantityKind: timestamp, planningUse: [temporal]}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 3}
      - name: entity_ref
        logicalType: string
        physicalType: string
        required: true
        description: "Identifier of the entity the event refers to (order_id, vehicle_id, ...)."
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:relationship:entity-ref, binding: event.entityRef, planningUse: [replanning-trigger]}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 4}
      - name: payload_json
        logicalType: string
        physicalType: string
        required: false
        description: Event-specific payload encoded as a JSON string.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:attribute:event-payload, binding: event.payload, planningUse: [replanning-trigger]}
          - property: fieldGeneration
            value:
              avro: {default: "{}"}
              proto: {fieldNumber: 5}
