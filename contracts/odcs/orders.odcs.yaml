apiVersion: v3.0.0
kind: DataContract
id: orders
version: 1.0.0
status: active
name: Service Orders
domain: agricultural-custom-services
tenant: fleet-ops
description:
  purpose: Farmer field-service orders mapped to canonical planning Tasks.
  usage: Task generation, time windows, contract commitments, objective terms.
servers:
  - server: batch
    type: local
    format: csv
    path: orders.csv
customProperties:
  - property: xOptimization
    value:
      extensionVersion: 0.1.0
      semanticModelRef: urn:xopt:model:agricultural-custom-services:0.1.0
      dataProductRole: serviceOrders
      mappingVersion: 1.0.0
      permittedPlanningUses: [periodic-planning, rolling-dispatch]
      defaultQualityPolicyRef: dq://orders/master/v1
schema:
  - name: orders
    logicalType: object
    physicalType: csv
    customProperties:
      - property: schemaGeneration
        value:
          avro:
            namespace: org.example.agri.orders
            recordName: ServiceOrder
            recordDoc: "Farmer field-service order, mapped to a canonical Task. Source dataset: orders.csv."
          proto:
            package: org.example.agri.orders
            messageName: ServiceOrder
            syntax: proto3
          es:
            indexName: orders
            dynamic: strict
    properties:
      - name: order_id
        logicalType: string
        physicalType: string
        required: true
        description: Stable identifier of the order/task.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:identity:task-id, binding: task.taskId, planningUse: [identity]}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 1}
      - name: contract_id
        logicalType: string
        physicalType: string
        required: true
        description: Owning contract reference.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:relationship:contract, binding: task.orderId, planningUse: [commitment]}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 2}
      - name: field_id
        logicalType: string
        physicalType: string
        required: true
        description: Field where the operation is performed.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:relationship:location, binding: task.locationRef, planningUse: [geospatial], missingValuePolicy: reject-for-planning}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 3}
      - name: operation_type
        logicalType: string
        physicalType: string
        required: true
        description: Agronomic operation.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:attribute:operation-type, binding: task.operationType, planningUse: [compatibility-filter], missingValuePolicy: reject-for-planning}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 4}
      - name: area_ha
        logicalType: number
        physicalType: double
        required: true
        description: Field service area.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:attribute:service-area, binding: task.areaHa, canonicalUnit: ha, quantityKind: area, planningUse: [duration-estimation], missingValuePolicy: reject-for-planning}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 5}
      - name: deadline
        logicalType: date
        physicalType: string
        required: true
        description: ISO-8601 deadline; hard time-window end.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:commitment:deadline, binding: task.deadline, quantityKind: timestamp, planningUse: [time-window, commitment], missingValuePolicy: reject-for-planning}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 6}
      - name: penalty_per_day_eur
        logicalType: number
        physicalType: double
        required: true
        description: Penalty per calendar day the deadline is missed.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:commitment:lateness-penalty, binding: task.penaltyPerDay, canonicalUnit: EUR, quantityKind: money, planningUse: [objective, commitment], missingValuePolicy: fallback-to-conservative-value}
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 7}
      - name: priority
        logicalType: integer
        physicalType: int
        required: false
        description: Priority class 1-10.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:attribute:priority-class, binding: task.priorityClass, planningUse: [objective], missingValuePolicy: fallback-to-conservative-value}
          - property: fieldGeneration
            value:
              avro: {default: 5}
              proto: {fieldNumber: 8}
      - name: status
        logicalType: string
        physicalType: string
        required: false
        description: Lifecycle status.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:attribute:task-status, binding: task.status, planningUse: [freeze]}
          - property: fieldGeneration
            value:
              avro: {default: pending}
              proto: {fieldNumber: 9}
      - name: estimated_revenue_eur
        logicalType: number
        physicalType: double
        required: false
        description: Estimated revenue if completed on time.
        customProperties:
          - property: xOptimization
            value: {extensionVersion: 0.1.0, semanticTerm: urn:xopt:attribute:expected-revenue, binding: task.revenueValue, canonicalUnit: EUR, quantityKind: money, planningUse: [objective], missingValuePolicy: fallback-to-conservative-value}
          - property: fieldGeneration
            value:
              avro: {default: 0.0}
              proto: {fieldNumber: 10}
