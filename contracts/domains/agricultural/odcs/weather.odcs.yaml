apiVersion: v3.0.0
kind: DataContract
id: weather
version: 1.0.0
status: active
name: Weather Forecasts
domain: agricultural-custom-services
tenant: fleet-ops
description:
  purpose: Forecast values by location and time interval mapped to canonical Forecasts.
  usage: Weather-window feasibility for weather-dependent operations.
  # Canonical projection lives in mappings/weather.mapping.yaml.
servers:
  - server: stream
    type: local
    format: json
    path: weather.json
schema:
  - name: weather
    logicalType: object
    physicalType: json
    customProperties:
      - property: schemaGeneration
        value:
          avro:
            namespace: org.example.agri.weather
            recordName: WeatherWindow
            recordDoc: "Weather forecast window mapped to a canonical Forecast. Source dataset: weather.json."
          proto:
            package: org.example.agri.weather
            messageName: WeatherWindow
            syntax: proto3
          es:
            indexName: weather
            dynamic: strict
    properties:
      - name: window_id
        logicalType: string
        physicalType: string
        required: true
        description: Stable identifier of the forecast window.
        customProperties:
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 1}
      - name: valid_from
        logicalType: timestamp
        physicalType: string
        required: true
        description: ISO-8601 start of the forecast interval.
        customProperties:
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 2}
      - name: valid_to
        logicalType: timestamp
        physicalType: string
        required: true
        description: ISO-8601 end of the forecast interval.
        customProperties:
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 3}
      - name: wind_ms
        logicalType: number
        physicalType: double
        required: true
        description: Sustained wind speed.
        customProperties:
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 4}
      - name: rain_mm_per_h
        logicalType: number
        physicalType: double
        required: true
        description: Hourly rainfall.
        customProperties:
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 5}
      - name: soil_moisture_pct
        logicalType: number
        physicalType: double
        required: true
        description: Volumetric soil moisture.
        customProperties:
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 6}
      - name: lat
        logicalType: number
        physicalType: double
        required: true
        description: Forecast location latitude.
        customProperties:
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 7}
      - name: lon
        logicalType: number
        physicalType: double
        required: true
        description: Forecast location longitude.
        customProperties:
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 8}
