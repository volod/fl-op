apiVersion: v3.0.0
kind: DataContract
id: orders
version: 1.1.0
status: active
name: Service Orders
domain: agricultural-custom-services
tenant: fleet-ops
description:
  purpose: Farmer field-service orders mapped to canonical planning Tasks.
  usage: Task generation, time windows, contract commitments, objective terms.
  # Canonical projection lives in mappings/orders.mapping.yaml.
servers:
  - server: batch
    type: local
    format: csv
    path: orders.csv
schema:
  - name: orders
    logicalType: object
    physicalType: csv
    customProperties:
      - property: schemaGeneration
        value:
          avro:
            namespace: org.example.agri.orders
            recordName: ServiceOrder
            recordDoc: "Farmer field-service order, mapped to a canonical Task. Source dataset: orders.csv."
          proto:
            package: org.example.agri.orders
            messageName: ServiceOrder
            syntax: proto3
          es:
            indexName: orders
            dynamic: strict
    properties:
      - name: order_id
        logicalType: string
        physicalType: string
        required: true
        description: Stable identifier of the order/task.
        customProperties:
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 1}
      - name: contract_id
        logicalType: string
        physicalType: string
        required: true
        description: Owning contract reference.
        customProperties:
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 2}
      - name: field_id
        logicalType: string
        physicalType: string
        required: true
        description: Field where the operation is performed.
        customProperties:
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 3}
      - name: operation_type
        logicalType: string
        physicalType: string
        required: true
        description: Agronomic operation.
        customProperties:
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 4}
      - name: area_ha
        logicalType: number
        physicalType: double
        required: true
        description: Field service area.
        customProperties:
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 5}
      - name: deadline
        logicalType: timestamp
        physicalType: string
        required: true
        description: ISO-8601 deadline; hard time-window end.
        customProperties:
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 6}
      - name: penalty_per_day_eur
        logicalType: number
        physicalType: double
        required: true
        description: Penalty per calendar day the deadline is missed.
        customProperties:
          - property: fieldGeneration
            value:
              proto: {fieldNumber: 7}
      - name: priority
        logicalType: integer
        physicalType: int
        required: false
        description: Priority class 1-10.
        customProperties:
          - property: fieldGeneration
            value:
              avro: {default: 5}
              proto: {fieldNumber: 8}
      - name: status
        logicalType: string
        physicalType: string
        required: false
        description: Lifecycle status.
        customProperties:
          - property: fieldGeneration
            value:
              avro: {default: pending}
              proto: {fieldNumber: 9}
      - name: estimated_revenue_eur
        logicalType: number
        physicalType: double
        required: false
        description: Estimated revenue if completed on time.
        customProperties:
          - property: fieldGeneration
            value:
              avro: {default: 0.0}
              proto: {fieldNumber: 10}
      - name: depends_on_order_id
        logicalType: string
        physicalType: string
        required: false
        description: Order that must be served first (multi-stage field work).
        customProperties:
          - property: fieldGeneration
            value:
              avro: {default: ""}
              proto: {fieldNumber: 11}
      - name: workable_windows
        logicalType: array
        physicalType: string
        required: false
        description: Workable ISO-8601 "from/to" intervals (stringified list).
        customProperties:
          - property: fieldGeneration
            value:
              avro: {default: "[]"}
              proto: {fieldNumber: 12}
      - name: service_duration_minutes
        logicalType: number
        physicalType: double
        required: false
        description: Explicit effort override in minutes; 0 means estimate from area.
        customProperties:
          - property: fieldGeneration
            value:
              avro: {default: 0.0}
              proto: {fieldNumber: 13}
      - name: material_load_kg
        logicalType: number
        physicalType: double
        required: false
        description: Mass of material to deliver to the field; 0 means none.
        customProperties:
          - property: fieldGeneration
            value:
              avro: {default: 0.0}
              proto: {fieldNumber: 14}
      - name: pickup_location_ref
        logicalType: string
        physicalType: string
        required: false
        description: >-
          Supply location where the material load is picked up before the field
          (paired pickup-and-delivery); empty means the load is carried from the
          depot.
        customProperties:
          - property: fieldGeneration
            value:
              avro: {default: ""}
              proto: {fieldNumber: 15}
