apiVersion: x-optimization/v0.1.0
kind: CanonicalMapping

# Projects the agricultural physical 'orders' schema onto the canonical Task
# entity.
metadata:
  domain: agricultural
  sourceContract: orders
  canonicalEntity: task
  canonicalModelRef: urn:xopt:model:canonical:0.1.0
  mappingVersion: 1.0.0
  dataProductRole: serviceOrders
  permittedPlanningUses: [periodic-planning, rolling-dispatch]

fieldMappings:
  - sourceField: order_id
    binding: task.taskId
    semanticTerm: urn:xopt:identity:task-id
    planningUse: [identity]
  - sourceField: contract_id
    binding: task.orderId
    semanticTerm: urn:xopt:relationship:contract
    planningUse: [commitment]
  - sourceField: field_id
    binding: task.locationRef
    semanticTerm: urn:xopt:relationship:location
    planningUse: [geospatial]
    missingValuePolicy: reject-for-planning
  - sourceField: operation_type
    binding: task.operationType
    semanticTerm: urn:xopt:attribute:operation-type
    planningUse: [compatibility-filter]
    missingValuePolicy: reject-for-planning
  - sourceField: area_ha
    binding: task.areaHa
    semanticTerm: urn:xopt:attribute:service-area
    canonicalUnit: ha
    quantityKind: area
    planningUse: [duration-estimation]
    missingValuePolicy: reject-for-planning
  # The same physical area also projects onto the generic work-quantity term,
  # so the engine's duration estimation is quantity-driven, not area-specific.
  - sourceField: area_ha
    binding: task.workQuantity
    semanticTerm: urn:xopt:attribute:work-quantity
    canonicalUnit: ha
    quantityKind: work
    planningUse: [duration-estimation]
    missingValuePolicy: accept-optional
  - sourceField: service_duration_minutes
    binding: task.serviceDurationMinutes
    semanticTerm: urn:xopt:attribute:service-duration
    canonicalUnit: min
    quantityKind: duration
    planningUse: [duration-estimation]
    missingValuePolicy: accept-optional
  - sourceField: material_load_kg
    binding: task.loadDemand
    semanticTerm: urn:xopt:attribute:load-demand
    canonicalUnit: kg
    quantityKind: mass
    planningUse: [capacity]
    missingValuePolicy: accept-optional
  - sourceField: depends_on_order_id
    binding: task.dependsOnTaskRef
    semanticTerm: urn:xopt:relationship:depends-on
    planningUse: [precedence]
    missingValuePolicy: accept-optional
  - sourceField: workable_windows
    binding: task.timeWindows
    semanticTerm: urn:xopt:time:workable-windows
    quantityKind: interval-set
    planningUse: [time-window]
    missingValuePolicy: accept-optional
  - sourceField: deadline
    binding: task.deadline
    semanticTerm: urn:xopt:commitment:deadline
    quantityKind: timestamp
    planningUse: [time-window, commitment]
    missingValuePolicy: reject-for-planning
  - sourceField: penalty_per_day_eur
    binding: task.penaltyPerDay
    semanticTerm: urn:xopt:commitment:lateness-penalty
    canonicalUnit: EUR
    quantityKind: money
    planningUse: [objective, commitment]
    missingValuePolicy: fallback-to-conservative-value
  - sourceField: priority
    binding: task.priorityClass
    semanticTerm: urn:xopt:attribute:priority-class
    planningUse: [objective]
    missingValuePolicy: fallback-to-conservative-value
  - sourceField: status
    binding: task.status
    semanticTerm: urn:xopt:attribute:task-status
    planningUse: [freeze]
  - sourceField: estimated_revenue_eur
    binding: task.revenueValue
    semanticTerm: urn:xopt:attribute:expected-revenue
    canonicalUnit: EUR
    quantityKind: money
    planningUse: [objective]
    missingValuePolicy: fallback-to-conservative-value
