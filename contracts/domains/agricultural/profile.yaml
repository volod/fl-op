apiVersion: x-optimization/v0.1.0
kind: OptimizationProfile

metadata:
  id: agricultural-custom-services
  version: 0.1.0
  extensionVersion: 0.1.0
  semanticModelRef: urn:xopt:model:agricultural-custom-services:0.1.0
  canonicalModelRef: urn:xopt:model:canonical:0.1.0

# Input contracts consumed to build a planning snapshot. Each entry references a
# contract id registered in contracts/registry.yaml.
inputContracts:
  - vehicles
  - implements
  - operators
  - depots
  - fields
  - orders
  - weather
  - sensors
  - sensor-readings

planningModes:
  - id: periodic
    adapter: ortools-periodic
  - id: rolling
    adapter: ortools-rolling

bundleGeneration:
  roles:
    primaryAsset:
      - mobile-prime-mover
      - self-propelled-application-asset
    relatedEquipment:
      - implement
      - trailer
      - material-carrier
    operator:
      - equipment-operator

# Hard / medium / soft constraints. Constraints the slice enforces are marked
# enforced: true; the remainder are declared and validated for adapter support
# coverage but not yet wired into the solver.
constraints:
  - id: compatible-equipment
    severity: hard
    enforced: true
  - id: sufficient-power
    severity: hard
    enforced: true
  - id: operator-qualified
    severity: hard
    enforced: true
  - id: asset-available
    severity: hard
    enforced: true
  - id: no-double-booking
    severity: hard
    enforced: true
  - id: required-material-available
    severity: medium
    enforced: true
  - id: respect-contract-time-window
    severity: hard
    enforced: true
  - id: respect-weather-window
    severity: hard
    enforced: true
  - id: respect-field-restrictions
    severity: medium
    enforced: false
  - id: respect-manual-overrides
    severity: hard
    enforced: false
  - id: protect-frozen-tasks
    severity: hard
    enforced: true

# Weather-window limits and which weather dimensions each operation cares
# about; operations without an entry are never weather-blocked.
weatherPolicy:
  maxWindMs: 10.0
  maxRainMmPerH: 5.0
  maxSoilMoisturePct: 85.0
  sensitivity:
    SPRAYING: [wind, rain]
    FERTILIZING: [wind, rain]
    SEEDING: [rain, soil-moisture]
    TILLAGE: [soil-moisture]
    HARVESTING: [rain, soil-moisture]

# Consumable demand per operation type, charged against depot inventory.
materialDemand:
  FERTILIZING:
    material: fertilizer
    perAreaHa: 50.0

objectives:
  mode: lexicographic
  priorities:
    - maximize-mandatory-contract-fulfillment
    - minimize-contractual-penalties
    - maximize-expected-contribution-margin
    - minimize-plan-instability
    - minimize-repositioning-time
    - minimize-empty-distance
    - minimize-idle-time
    - balance-utilization

planningDefaults:
  periodicHorizonDays: 7
  rollingHorizonHours: 48
  freezeWindowMinutes: 60
  maxAssignmentRoutingIterations: 3

# Stationary-equipment monitoring policy: thresholds for deriving
# EQUIPMENT_SERVICE tasks from sensor-station observations. Asset-type
# overrides layer on top of the base policy for individual station classes.
monitoring:
  batteryLowThresholdPct: 20.0
  batteryCriticalThresholdPct: 5.0
  batteryForecastHorizonDays: 3.0
  minObservationConfidence: 0.5
  compositeHealthThreshold: 0.35
  serviceOperationType: EQUIPMENT_SERVICE
  servicePriorityClass: 2
  serviceDeadlineDays: 3
  servicePenaltyPerDayEur: 150.0
  serviceNominalAreaHa: 1.0
  # Escalation tier: the asset failed earlier than the prognosis (critical
  # battery or failed health) and must be visited urgently.
  escalatedPriorityClass: 1
  escalatedDeadlineDays: 1
  assetTypeOverrides:
    # Weather stations feed the weather-window constraints, so they get a
    # larger battery safety margin and a tighter service deadline.
    WEATHER_STATION:
      batteryLowThresholdPct: 25.0
      serviceDeadlineDays: 2

outputContracts:
  - dispatch-plans
