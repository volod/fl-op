apiVersion: v3.0.0
kind: DataContract
id: logistics-hubs
version: 1.0.0
status: active
name: Logistics Hubs
domain: drone-logistics
tenant: logistics-ops
description:
  purpose: Drone depots with fuel-equivalent energy inventory.
  usage: Route origins and cost/resource accounting.
servers: [{server: batch, type: local, format: csv, path: logistics-hubs.csv}]
schema:
  - name: logisticsHubs
    logicalType: object
    physicalType: csv
    customProperties:
      - property: schemaGeneration
        value:
          avro: {namespace: org.example.drone.locations, recordName: LogisticsHub, recordDoc: "Logistics hub mapped to canonical depot."}
          proto: {package: org.example.drone.locations, messageName: LogisticsHub, syntax: proto3}
          es: {indexName: logistics-hubs, dynamic: strict}
    properties:
      - {name: hub_id, logicalType: string, physicalType: string, required: true, description: Stable hub id., customProperties: [{property: fieldGeneration, value: {proto: {fieldNumber: 1}}}]}
      - {name: name, logicalType: string, physicalType: string, required: false, description: Display name., customProperties: [{property: fieldGeneration, value: {proto: {fieldNumber: 2}}}]}
      - {name: lat, logicalType: number, physicalType: double, required: true, description: Hub latitude., customProperties: [{property: fieldGeneration, value: {proto: {fieldNumber: 3}}}]}
      - {name: lon, logicalType: number, physicalType: double, required: true, description: Hub longitude., customProperties: [{property: fieldGeneration, value: {proto: {fieldNumber: 4}}}]}
      - {name: energy_units, logicalType: number, physicalType: double, required: false, description: Available energy in fuel-equivalent units., customProperties: [{property: fieldGeneration, value: {avro: {default: 0.0}, proto: {fieldNumber: 5}}}]}
