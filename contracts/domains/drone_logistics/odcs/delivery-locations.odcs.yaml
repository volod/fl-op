apiVersion: v3.0.0
kind: DataContract
id: delivery-locations
version: 1.0.0
status: active
name: Delivery Locations
domain: drone-logistics
tenant: logistics-ops
description:
  purpose: Pickup and dropoff points for last-mile deliveries.
  usage: Canonical locations referenced by delivery tasks and travel links.
servers: [{server: batch, type: local, format: csv, path: delivery-locations.csv}]
schema:
  - name: deliveryLocations
    logicalType: object
    physicalType: csv
    customProperties:
      - property: schemaGeneration
        value:
          avro: {namespace: org.example.drone.locations, recordName: DeliveryLocation, recordDoc: "Delivery point mapped to canonical location."}
          proto: {package: org.example.drone.locations, messageName: DeliveryLocation, syntax: proto3}
          es: {indexName: delivery-locations, dynamic: strict}
    properties:
      - {name: location_id, logicalType: string, physicalType: string, required: true, description: Stable location id., customProperties: [{property: fieldGeneration, value: {proto: {fieldNumber: 1}}}]}
      - {name: name, logicalType: string, physicalType: string, required: false, description: Display name., customProperties: [{property: fieldGeneration, value: {proto: {fieldNumber: 2}}}]}
      - {name: lat, logicalType: number, physicalType: double, required: true, description: Latitude., customProperties: [{property: fieldGeneration, value: {proto: {fieldNumber: 3}}}]}
      - {name: lon, logicalType: number, physicalType: double, required: true, description: Longitude., customProperties: [{property: fieldGeneration, value: {proto: {fieldNumber: 4}}}]}
      - {name: service_area_ha, logicalType: number, physicalType: double, required: false, description: Nominal service footprint., customProperties: [{property: fieldGeneration, value: {avro: {default: 0.0}, proto: {fieldNumber: 5}}}]}
      - {name: polygon, logicalType: array, physicalType: string, required: false, description: Optional site polygon., customProperties: [{property: fieldGeneration, value: {avro: {default: ""}, proto: {fieldNumber: 6}}}]}
      - {name: restricted_operations, logicalType: array, physicalType: string, required: false, description: Operations prohibited at the point., customProperties: [{property: fieldGeneration, value: {avro: {default: ""}, proto: {fieldNumber: 7}}}]}
      - {name: restriction_windows, logicalType: array, physicalType: string, required: false, description: Time windows when service may not start., customProperties: [{property: fieldGeneration, value: {avro: {default: ""}, proto: {fieldNumber: 8}}}]}
      - {name: customer_class, logicalType: string, physicalType: string, required: false, description: Manufacturer, restaurant, or online-store marker., customProperties: [{property: fieldGeneration, value: {avro: {default: ""}, proto: {fieldNumber: 9}}}]}
