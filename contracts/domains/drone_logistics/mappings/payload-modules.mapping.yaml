apiVersion: x-optimization/v0.1.0
kind: CanonicalMapping
metadata:
  domain: drone_logistics
  sourceContract: payload-modules
  canonicalEntity: asset
  assetRole: implement
  canonicalModelRef: urn:xopt:model:canonical:0.1.0
  mappingVersion: 1.0.0
  dataProductRole: assetMaster
  permittedPlanningUses: [periodic-planning, rolling-dispatch]
fieldMappings:
  - {sourceField: module_id, binding: asset.assetId, semanticTerm: urn:xopt:identity:asset-id, planningUse: [identity]}
  - {sourceField: module_class, binding: asset.assetType, semanticTerm: urn:xopt:attribute:asset-type, planningUse: [classification]}
  - {sourceField: supported_operations, binding: asset.capabilities.compatibleOperations, semanticTerm: urn:xopt:capability:compatible-operations, quantityKind: categorical-set, planningUse: [compatibility-filter]}
  - {sourceField: required_power_kw, binding: asset.capabilities.requiredPower, semanticTerm: urn:xopt:capability:required-power, canonicalUnit: kW, quantityKind: power, planningUse: [compatibility-filter]}
  - {sourceField: min_speed_kmh, binding: asset.capabilities.minOperatingSpeed, semanticTerm: urn:xopt:capability:min-operating-speed, canonicalUnit: km/h, quantityKind: speed, planningUse: [duration-estimation]}
  - {sourceField: max_speed_kmh, binding: asset.capabilities.maxOperatingSpeed, semanticTerm: urn:xopt:capability:max-operating-speed, canonicalUnit: km/h, quantityKind: speed, planningUse: [duration-estimation]}
  - {sourceField: hub_id, binding: asset.homeDepotRef, semanticTerm: urn:xopt:relationship:home-depot, planningUse: [assignment]}
  - {sourceField: work_rates, binding: asset.capabilities.workRates, semanticTerm: urn:xopt:capability:work-rates, quantityKind: rate-map, planningUse: [duration-estimation]}
