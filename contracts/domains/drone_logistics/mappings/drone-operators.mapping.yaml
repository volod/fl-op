apiVersion: x-optimization/v0.1.0
kind: CanonicalMapping
metadata:
  domain: drone_logistics
  sourceContract: drone-operators
  canonicalEntity: asset
  assetRole: operator
  canonicalModelRef: urn:xopt:model:canonical:0.1.0
  mappingVersion: 1.0.0
  dataProductRole: operatorRoster
  permittedPlanningUses: [periodic-planning, rolling-dispatch]
fieldMappings:
  - {sourceField: operator_id, binding: asset.assetId, semanticTerm: urn:xopt:identity:asset-id, planningUse: [identity]}
  - {sourceField: full_name, binding: asset.name, semanticTerm: urn:xopt:attribute:display-name, planningUse: [classification]}
  - {sourceField: shift_start_s, binding: asset.availability.shiftStart, semanticTerm: urn:xopt:availability:shift-start, canonicalUnit: s, quantityKind: time, planningUse: [availability]}
  - {sourceField: shift_end_s, binding: asset.availability.shiftEnd, semanticTerm: urn:xopt:availability:shift-end, canonicalUnit: s, quantityKind: time, planningUse: [availability]}
  - {sourceField: certified_operations, binding: asset.capabilities.certifiedOperations, semanticTerm: urn:xopt:capability:operator-certification, quantityKind: categorical-set, planningUse: [compatibility-filter]}
  - {sourceField: hub_id, binding: asset.homeDepotRef, semanticTerm: urn:xopt:relationship:home-depot, planningUse: [assignment]}
