apiVersion: x-optimization/v0.1.0
kind: OptimizationProfile

# Roadside-infrastructure example pack: stationary signage/sensor assets along
# road segments, with inspection rounds as the observation source. Maintenance
# demand is monitoring-derived (EQUIPMENT_SERVICE tasks), not order-driven.
metadata:
  id: roadside-infrastructure
  version: 0.1.0
  extensionVersion: 0.1.0
  semanticModelRef: urn:xopt:model:roadside-infrastructure:0.1.0
  canonicalModelRef: urn:xopt:model:canonical:0.1.0

# Input contracts consumed to build a planning snapshot.
inputContracts:
  - service-vehicles
  - service-kits
  - technicians
  - signage
  - road-segments
  - service-depots
  - maintenance-jobs
  - inspection-rounds

planningModes:
  - id: periodic
    adapter: ortools-periodic
  - id: rolling
    adapter: ortools-rolling

bundleGeneration:
  roles:
    primaryAsset:
      - mobile-prime-mover
    relatedEquipment:
      - implement
    operator:
      - operator

constraints:
  - id: compatible-equipment
    severity: hard
    enforced: true
  - id: sufficient-power
    severity: hard
    enforced: true
  - id: asset-available
    severity: hard
    enforced: true
  - id: no-double-booking
    severity: hard
    enforced: true
  - id: respect-contract-time-window
    severity: hard
    enforced: true
  - id: protect-frozen-tasks
    severity: hard
    enforced: true

objectives:
  mode: lexicographic
  priorities:
    - maximize-mandatory-contract-fulfillment
    - minimize-contractual-penalties
    - minimize-plan-instability
    - minimize-repositioning-time

# Stationary-equipment monitoring drives this pack: inspection findings are
# the observation series the policy assesses, with stricter thresholds for
# powered assets (speed radars drain batteries faster than passive signs).
monitoring:
  batteryLowThresholdPct: 25.0
  batteryForecastHorizonDays: 5.0
  servicePriorityClass: 2
  serviceDeadlineDays: 5
  serviceDurationMinutes: 45
  servicePenaltyPerDayEur: 900
  assetTypeOverrides:
    speed_radar:
      batteryLowThresholdPct: 35.0
      serviceDeadlineDays: 2

planningDefaults:
  periodicHorizonDays: 14
  rollingHorizonHours: 72
  freezeWindowMinutes: 120
  maxAssignmentRoutingIterations: 3

outputContracts:
  - dispatch-plans
