apiVersion: x-optimization/v0.1.0
kind: CanonicalMapping

# Projects the roadside physical 'service-depots' schema onto the canonical
# Location entity (depot role).
metadata:
  domain: roadside
  sourceContract: service-depots
  canonicalEntity: location
  assetRole: depot
  canonicalModelRef: urn:xopt:model:canonical:0.1.0
  mappingVersion: 1.0.0
  dataProductRole: depots
  permittedPlanningUses: [periodic-planning, rolling-dispatch]

fieldMappings:
  - sourceField: depot_id
    binding: location.locationId
    semanticTerm: urn:xopt:identity:location-id
    planningUse: [identity]
  - sourceField: name
    binding: location.name
    semanticTerm: urn:xopt:attribute:display-name
    planningUse: [display]
  - sourceField: lat
    binding: location.lat
    semanticTerm: urn:xopt:attribute:latitude
    canonicalUnit: deg
    quantityKind: angle
    planningUse: [geospatial]
    missingValuePolicy: reject-for-planning
  - sourceField: lon
    binding: location.lon
    semanticTerm: urn:xopt:attribute:longitude
    canonicalUnit: deg
    quantityKind: angle
    planningUse: [geospatial]
    missingValuePolicy: reject-for-planning
  - sourceField: fuel_litres
    binding: location.inventory.fuel
    semanticTerm: urn:xopt:inventory:fuel
    canonicalUnit: L
    quantityKind: volume
    planningUse: [material-availability]
    missingValuePolicy: accept-with-warning
