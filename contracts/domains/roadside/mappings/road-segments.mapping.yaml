apiVersion: x-optimization/v0.1.0
kind: CanonicalMapping

# Projects the roadside physical 'road-segments' schema onto the canonical
# Location entity (work-site role). The segment midpoint is the service-visit
# anchor; lane-closure curfews map onto the canonical restriction windows.
metadata:
  domain: roadside
  sourceContract: road-segments
  canonicalEntity: location
  canonicalModelRef: urn:xopt:model:canonical:0.1.0
  mappingVersion: 1.0.0
  dataProductRole: workSites
  permittedPlanningUses: [periodic-planning, rolling-dispatch]

fieldMappings:
  - sourceField: segment_id
    binding: location.locationId
    semanticTerm: urn:xopt:identity:location-id
    planningUse: [identity]
  - sourceField: road_ref
    binding: location.name
    semanticTerm: urn:xopt:attribute:display-name
    planningUse: [display]
  - sourceField: midpoint_lat
    binding: location.lat
    semanticTerm: urn:xopt:attribute:latitude
    canonicalUnit: deg
    quantityKind: angle
    planningUse: [geospatial]
    missingValuePolicy: reject-for-planning
  - sourceField: midpoint_lon
    binding: location.lon
    semanticTerm: urn:xopt:attribute:longitude
    canonicalUnit: deg
    quantityKind: angle
    planningUse: [geospatial]
    missingValuePolicy: reject-for-planning
  - sourceField: surface_type
    binding: location.soilType
    semanticTerm: urn:xopt:attribute:soil-type
    planningUse: [field-restriction]
  - sourceField: closure_windows
    binding: location.restrictionWindows
    semanticTerm: urn:xopt:restriction:restricted-windows
    quantityKind: interval-set
    planningUse: [field-restriction, time-window]
    missingValuePolicy: accept-optional
