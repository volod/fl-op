apiVersion: x-optimization/v0.1.0
kind: CanonicalModel

# The canonical optimization model: the single source of truth for what the
# optimization engine consumes. Domain mapping packs (contracts/domains/<domain>)
# project their physical schemas onto the entities and semantic terms declared
# here. The engine never reads a physical schema directly; it only sees canonical
# entities built according to these contracts.
metadata:
  canonicalModelRef: urn:xopt:model:canonical:0.1.0
  version: 0.1.0
  extensionVersion: 0.1.0
  description: Minimal entity, capability, and semantic-term contract for fleet optimization.

# Canonical entities. Each references an ODCS DataContract that declares the
# entity's canonical fields, their bindings, required flags, and semantic terms.
entities:
  asset:
    contract: odcs/asset.odcs.yaml
    description: A schedulable resource (prime mover, implement, operator).
  location:
    contract: odcs/location.odcs.yaml
    description: A point of interest (work site, depot, supplier, loading station).
  task:
    contract: odcs/task.odcs.yaml
    description: A unit of work requested by a contract/order.
  forecast:
    contract: odcs/forecast.odcs.yaml
    description: An environmental forecast for a location and time interval.
  observation:
    contract: odcs/observation.odcs.yaml
    description: >-
      A measured value reported about an entity (sensor reading, telemetry
      sample, manual inspection). Covers both historical batches and realtime
      streamed readings; the engine's monitoring policy derives service tasks
      for stationary equipment from the latest observations.
  commitment:
    contract: odcs/commitment.odcs.yaml
    description: A contractual obligation (deadline, penalty, hardness) attached to work.
  execution-event:
    contract: odcs/execution-event.odcs.yaml
    description: An operational event envelope that triggers rolling re-solves.
  travel-link:
    contract: odcs/travel-link.odcs.yaml
    description: >-
      One directed travel-network edge between two locations with a measured
      travel time (road graph / distance-matrix entry). Location pairs without
      a link fall back to haversine distance and asset travel speed.
  cost-rate:
    contract: odcs/cost-rate.odcs.yaml
    description: >-
      A priced resource rate (fuel, consumable material) with a validity
      window. Engine cost constants are the fallback when no rate is mapped.
  plan:
    contract: odcs/plan.odcs.yaml
    description: >-
      The canonical OUTPUT contract: the plan envelope with its assignment,
      unassigned-task, and material-reservation records. Produced by solver
      adapters, never consumed as snapshot input; declared here so outputs are
      governed by the same contract machinery as inputs.

# Controlled vocabulary of semantic terms. A domain mapping may only bind a
# physical field to a canonical field whose semanticTerm appears here. Each term
# fixes the meaning, value type, quantity kind, and canonical unit so that
# physical values from any domain are normalized to one comparable scale.
semanticTerms:
  # -- identity --------------------------------------------------------------
  urn:xopt:identity:asset-id: {valueType: string, quantityKind: identifier}
  urn:xopt:identity:location-id: {valueType: string, quantityKind: identifier}
  urn:xopt:identity:task-id: {valueType: string, quantityKind: identifier}
  urn:xopt:identity:forecast-id: {valueType: string, quantityKind: identifier}
  urn:xopt:identity:event-id: {valueType: string, quantityKind: identifier}
  urn:xopt:identity:observation-id: {valueType: string, quantityKind: identifier}
  urn:xopt:identity:commitment-id: {valueType: string, quantityKind: identifier}
  urn:xopt:identity:travel-link-id: {valueType: string, quantityKind: identifier}
  urn:xopt:identity:cost-rate-id: {valueType: string, quantityKind: identifier}
  urn:xopt:identity:plan-id: {valueType: string, quantityKind: identifier}
  urn:xopt:identity:revision-id: {valueType: string, quantityKind: identifier}
  urn:xopt:identity:assignment-id: {valueType: string, quantityKind: identifier}
  urn:xopt:identity:reservation-id: {valueType: string, quantityKind: identifier}
  urn:xopt:identity:snapshot-id: {valueType: string, quantityKind: identifier}
  # -- attributes ------------------------------------------------------------
  urn:xopt:attribute:asset-type: {valueType: string, quantityKind: categorical}
  urn:xopt:attribute:location-type: {valueType: string, quantityKind: categorical}
  urn:xopt:attribute:display-name: {valueType: string, quantityKind: text}
  urn:xopt:attribute:latitude: {valueType: number, quantityKind: angle, canonicalUnit: deg}
  urn:xopt:attribute:longitude: {valueType: number, quantityKind: angle, canonicalUnit: deg}
  urn:xopt:attribute:area: {valueType: number, quantityKind: area, canonicalUnit: ha}
  urn:xopt:attribute:service-area: {valueType: number, quantityKind: area, canonicalUnit: ha}
  # Generic work demand: the quantity drives duration estimation; the unit term
  # declares what the quantity counts (ha, m3, items, ...). Domains whose work
  # is not area-shaped bind these instead of service-area.
  urn:xopt:attribute:work-quantity: {valueType: number, quantityKind: work}
  urn:xopt:attribute:work-quantity-unit: {valueType: string, quantityKind: categorical}
  # Explicit effort override: when present it wins over any quantity-driven
  # duration estimate (fixed-effort visits, externally estimated jobs).
  urn:xopt:attribute:service-duration: {valueType: number, quantityKind: duration, canonicalUnit: min}
  # Mass the bundle must carry to the task (delivered material); enforced as a
  # cumulative route-load constraint against the prime mover's load capacity.
  urn:xopt:attribute:load-demand: {valueType: number, quantityKind: mass, canonicalUnit: kg}
  # Material code of the task's load demand; tasks sharing a code compete for
  # the same compartment. Empty means the unspecified aggregate material (one
  # shared load dimension bounded by the plain load capacity).
  urn:xopt:attribute:load-material: {valueType: string, quantityKind: categorical}
  urn:xopt:attribute:polygon: {valueType: array, quantityKind: geometry}
  urn:xopt:attribute:route-geometry: {valueType: array, quantityKind: geometry}
  # The specific work-area polygon a task must cover ([lat, lon] vertices), a
  # sub-region of its site; absent falls back to the whole site polygon. The
  # covered-geometry is the union of completed passes accumulated from spatial
  # execution feedback, subtracted (with restricted areas) to leave the residual
  # uncovered work the partial-area clip and duration estimate are sized on.
  urn:xopt:attribute:work-area-geometry: {valueType: array, quantityKind: geometry}
  urn:xopt:attribute:covered-geometry: {valueType: array, quantityKind: geometry}
  urn:xopt:attribute:soil-type: {valueType: string, quantityKind: categorical}
  urn:xopt:attribute:operation-type: {valueType: string, quantityKind: categorical}
  urn:xopt:attribute:priority-class: {valueType: integer, quantityKind: ordinal}
  urn:xopt:attribute:task-status: {valueType: string, quantityKind: categorical}
  urn:xopt:attribute:expected-revenue: {valueType: number, quantityKind: money, canonicalUnit: EUR}
  urn:xopt:attribute:event-type: {valueType: string, quantityKind: categorical}
  urn:xopt:attribute:event-payload: {valueType: string, quantityKind: text}
  urn:xopt:attribute:mobility: {valueType: string, quantityKind: categorical}
  # -- maintenance (master data; dynamic condition comes from observations) -----
  urn:xopt:maintenance:last-service-at: {valueType: string, quantityKind: timestamp}
  urn:xopt:maintenance:service-interval: {valueType: number, quantityKind: duration, canonicalUnit: d}
  # -- observations (sensor / telemetry measurements) --------------------------
  urn:xopt:observation:metric: {valueType: string, quantityKind: categorical}
  urn:xopt:observation:value: {valueType: number, quantityKind: measurement}
  urn:xopt:observation:state: {valueType: string, quantityKind: categorical}
  urn:xopt:observation:unit: {valueType: string, quantityKind: categorical}
  urn:xopt:observation:quality-flag: {valueType: string, quantityKind: categorical}
  # -- commitment qualifiers ----------------------------------------------------
  urn:xopt:commitment:type: {valueType: string, quantityKind: categorical}
  urn:xopt:commitment:hardness: {valueType: string, quantityKind: categorical}
  # -- capabilities ----------------------------------------------------------
  urn:xopt:capability:rated-power: {valueType: number, quantityKind: power, canonicalUnit: kW}
  urn:xopt:capability:required-power: {valueType: number, quantityKind: power, canonicalUnit: kW}
  urn:xopt:capability:fuel-tank-volume: {valueType: number, quantityKind: volume, canonicalUnit: L}
  urn:xopt:capability:fuel-consumption-rate: {valueType: number, quantityKind: flow-rate, canonicalUnit: L/h}
  urn:xopt:capability:energy-resource-type: {valueType: string, quantityKind: categorical}
  urn:xopt:capability:energy-unit: {valueType: string, quantityKind: categorical}
  urn:xopt:capability:energy-capacity: {valueType: number, quantityKind: energy, canonicalUnit: kWh}
  urn:xopt:capability:energy-consumption-rate: {valueType: number, quantityKind: energy-flow-rate, canonicalUnit: kWh/h}
  urn:xopt:capability:travel-speed: {valueType: number, quantityKind: speed, canonicalUnit: km/h}
  urn:xopt:capability:working-width: {valueType: number, quantityKind: length, canonicalUnit: m}
  urn:xopt:capability:min-operating-speed: {valueType: number, quantityKind: speed, canonicalUnit: km/h}
  urn:xopt:capability:max-operating-speed: {valueType: number, quantityKind: speed, canonicalUnit: km/h}
  urn:xopt:capability:fertilizer-capacity: {valueType: number, quantityKind: mass, canonicalUnit: kg}
  # Total mass a prime mover can carry on one route (pickup-and-delivery
  # flows); absent or zero means the vehicle's load is unconstrained.
  urn:xopt:capability:load-capacity: {valueType: number, quantityKind: mass, canonicalUnit: kg}
  # Per-material compartment capacities (material code -> kg). Materials
  # absent from the map fall back to the aggregate load-capacity.
  urn:xopt:capability:load-capacities: {valueType: object, quantityKind: rate-map}
  urn:xopt:capability:compatible-operations: {valueType: array, quantityKind: categorical-set}
  urn:xopt:capability:operator-certification: {valueType: array, quantityKind: categorical-set}
  # Work quantity processed per hour, keyed by work-quantity unit code
  # ("ha", "m3", "items"). Drives duration estimation uniformly for any unit
  # kind; a declared rate for an area unit overrides the width-times-speed
  # coverage model. Units absent from the map fall back to that model (area)
  # or to the nominal effort (other units).
  urn:xopt:capability:work-rates: {valueType: object, quantityKind: rate-map}
  # Per-asset operating cost rates (EUR per operating hour). Machine-wear is a
  # prime-mover attribute, operator-wage an operator attribute; either overrides
  # the fleet-level cost-rate fallback when the asset declares it.
  urn:xopt:capability:machine-wear-rate: {valueType: number, quantityKind: money, canonicalUnit: EUR}
  urn:xopt:capability:operator-wage: {valueType: number, quantityKind: money, canonicalUnit: EUR}
  # -- availability ----------------------------------------------------------
  urn:xopt:availability:shift-start: {valueType: integer, quantityKind: time, canonicalUnit: s}
  urn:xopt:availability:shift-end: {valueType: integer, quantityKind: time, canonicalUnit: s}
  # -- commitments -----------------------------------------------------------
  urn:xopt:commitment:deadline: {valueType: string, quantityKind: timestamp}
  urn:xopt:commitment:lateness-penalty: {valueType: number, quantityKind: money, canonicalUnit: EUR}
  # -- relationships ---------------------------------------------------------
  urn:xopt:relationship:home-depot: {valueType: string, quantityKind: identifier}
  urn:xopt:relationship:contract: {valueType: string, quantityKind: identifier}
  # Mutually-exclusive task alternatives for the same real-world order share
  # this key; the solver may serve at most one member of the group.
  urn:xopt:relationship:alternative-group: {valueType: string, quantityKind: identifier}
  urn:xopt:relationship:location: {valueType: string, quantityKind: identifier}
  urn:xopt:relationship:entity-ref: {valueType: string, quantityKind: identifier}
  # Predecessor task that must be served before this one (multi-stage work
  # sequences). A reference to a task absent from the planning input is treated
  # as already satisfied (the predecessor completed in an earlier revision).
  urn:xopt:relationship:depends-on: {valueType: string, quantityKind: identifier}
  # Pickup location of a paired pickup-and-delivery task: the load is picked
  # up there and dropped at the task location (same vehicle, pickup first).
  # Absent means the load is carried from the depot.
  urn:xopt:relationship:pickup-location: {valueType: string, quantityKind: identifier}
  # Directed travel-network edge endpoints (travel-link entity).
  urn:xopt:relationship:from-location: {valueType: string, quantityKind: identifier}
  urn:xopt:relationship:to-location: {valueType: string, quantityKind: identifier}
  # Task served by a plan record (assignment, unassigned-task, reservation).
  urn:xopt:relationship:task: {valueType: string, quantityKind: identifier}
  # Resources participating in one plan record (asset bundle, operators).
  urn:xopt:relationship:entity-refs: {valueType: array, quantityKind: categorical-set}
  # -- travel network ----------------------------------------------------------
  urn:xopt:travel:travel-time: {valueType: number, quantityKind: duration, canonicalUnit: s}
  urn:xopt:travel:distance: {valueType: number, quantityKind: length, canonicalUnit: km}
  urn:xopt:travel:network-mode: {valueType: string, quantityKind: categorical}
  # Directed toll charged to traverse the link (EUR); absent/zero means untolled.
  urn:xopt:travel:toll: {valueType: number, quantityKind: money, canonicalUnit: EUR}
  # -- cost rates --------------------------------------------------------------
  # rate-type uses canonical resource codes the engine interprets ("fuel",
  # "fertilizer", "electricity"); per-unit declares what one unit-price buys
  # (L, kg, kWh, ...).
  urn:xopt:cost:rate-type: {valueType: string, quantityKind: categorical}
  urn:xopt:cost:unit-price: {valueType: number, quantityKind: money, canonicalUnit: EUR}
  urn:xopt:cost:per-unit: {valueType: string, quantityKind: categorical}
  # -- restrictions ------------------------------------------------------------
  # Operation types prohibited at a location (restricted zone), and ISO-8601
  # "from/to" intervals during which no execution may start there
  # (time-restricted area: curfew, protection period).
  urn:xopt:restriction:prohibited-operations: {valueType: array, quantityKind: categorical-set}
  urn:xopt:restriction:restricted-windows: {valueType: array, quantityKind: interval-set}
  # -- plan output -------------------------------------------------------------
  urn:xopt:plan:planning-mode: {valueType: string, quantityKind: categorical}
  urn:xopt:plan:status: {valueType: string, quantityKind: categorical}
  urn:xopt:plan:reason-code: {valueType: string, quantityKind: categorical}
  urn:xopt:plan:reservation-status: {valueType: string, quantityKind: categorical}
  urn:xopt:plan:expected-cost: {valueType: number, quantityKind: money, canonicalUnit: EUR}
  urn:xopt:plan:expected-margin: {valueType: number, quantityKind: money, canonicalUnit: EUR}
  urn:xopt:plan:optimization-objective: {valueType: string, quantityKind: categorical}
  urn:xopt:plan:margin-score: {valueType: number, quantityKind: money, canonicalUnit: EUR}
  urn:xopt:plan:completion-time-score: {valueType: number, quantityKind: duration, canonicalUnit: s}
  urn:xopt:plan:assignment-count: {valueType: integer, quantityKind: count}
  urn:xopt:plan:cluster-count: {valueType: integer, quantityKind: count}
  urn:xopt:plan:instability-penalty: {valueType: integer, quantityKind: count}
  urn:xopt:plan:corrective-action: {valueType: string, quantityKind: categorical}
  urn:xopt:plan:evidence: {valueType: object, quantityKind: evidence}
  urn:xopt:quality:finding-count: {valueType: integer, quantityKind: count}
  urn:xopt:quality:entities-excluded: {valueType: integer, quantityKind: count}
  urn:xopt:quality:imputed-count: {valueType: integer, quantityKind: count}
  urn:xopt:quality:severity-counts: {valueType: object, quantityKind: rate-map}
  urn:xopt:quality:observation-error-rates: {valueType: object, quantityKind: rate-map}
  urn:xopt:inventory:material-type: {valueType: string, quantityKind: categorical}
  urn:xopt:inventory:quantity: {valueType: number, quantityKind: measurement}
  # -- inventory -------------------------------------------------------------
  urn:xopt:inventory:fuel: {valueType: number, quantityKind: volume, canonicalUnit: L}
  urn:xopt:inventory:fertilizer: {valueType: number, quantityKind: mass, canonicalUnit: kg}
  urn:xopt:inventory:energy: {valueType: number, quantityKind: energy, canonicalUnit: kWh}
  # -- recharge / refuel station capacity ------------------------------------
  # Generic depot/station replenishment capacity: aggregate charger power and
  # the number of parallel charging/refuelling bays (queue capacity). Drone
  # hubs bind these; any depot domain may reuse them.
  urn:xopt:capacity:charging-power: {valueType: number, quantityKind: power, canonicalUnit: kW}
  urn:xopt:capacity:charging-slots: {valueType: integer, quantityKind: count}
  # -- forecast values -------------------------------------------------------
  urn:xopt:forecast:wind-speed: {valueType: number, quantityKind: speed, canonicalUnit: m/s}
  urn:xopt:forecast:precipitation-rate: {valueType: number, quantityKind: flow-rate, canonicalUnit: mm/h}
  urn:xopt:forecast:soil-moisture: {valueType: number, quantityKind: ratio, canonicalUnit: "%"}
  # -- time ------------------------------------------------------------------
  urn:xopt:time:forecast-from: {valueType: string, quantityKind: timestamp}
  urn:xopt:time:forecast-to: {valueType: string, quantityKind: timestamp}
  urn:xopt:time:observed-at: {valueType: string, quantityKind: timestamp}
  # When the reading arrived at the platform (ingestion time). Makes arrival
  # order exact across restarts: timestamp-regression and skew detection use
  # it instead of approximating arrival by source row order.
  urn:xopt:time:ingested-at: {valueType: string, quantityKind: timestamp}
  urn:xopt:time:valid-from: {valueType: string, quantityKind: timestamp}
  urn:xopt:time:valid-to: {valueType: string, quantityKind: timestamp}
  urn:xopt:time:generated-at: {valueType: string, quantityKind: timestamp}
  urn:xopt:time:planned-start: {valueType: string, quantityKind: timestamp}
  urn:xopt:time:planned-end: {valueType: string, quantityKind: timestamp}
  # Workable windows the task execution must start within: a list of ISO-8601
  # "from/to" interval strings. Absent or empty means any time up to the deadline.
  urn:xopt:time:workable-windows: {valueType: array, quantityKind: interval-set}
