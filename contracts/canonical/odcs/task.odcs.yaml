apiVersion: v3.0.0
kind: DataContract
id: canonical-task
version: 0.2.0
status: active
name: Canonical Task
domain: canonical
tenant: optimization
description:
  purpose: Minimal optimization contract for a unit of schedulable work (task).
  usage: Assignment, time windows, contract commitments, objective terms.
customProperties:
  - property: canonicalEntity
    value:
      entity: task
      canonicalModelRef: urn:xopt:model:canonical:0.1.0
schema:
  - name: task
    logicalType: object
    properties:
      - name: taskId
        logicalType: string
        required: true
        description: Stable canonical identifier of the task.
        customProperties:
          - property: canonicalBinding
            value: {binding: task.taskId, semanticTerm: urn:xopt:identity:task-id, planningUse: [identity]}
      - name: orderId
        logicalType: string
        required: false
        description: Owning contract/order reference.
        customProperties:
          - property: canonicalBinding
            value: {binding: task.orderId, semanticTerm: urn:xopt:relationship:contract, planningUse: [commitment]}
      - name: locationRef
        logicalType: string
        required: true
        description: Location where the task is performed.
        customProperties:
          - property: canonicalBinding
            value: {binding: task.locationRef, semanticTerm: urn:xopt:relationship:location, planningUse: [geospatial]}
      - name: operationType
        logicalType: string
        required: true
        description: Operation the task requires; matched against asset capabilities.
        customProperties:
          - property: canonicalBinding
            value: {binding: task.operationType, semanticTerm: urn:xopt:attribute:operation-type, planningUse: [compatibility-filter]}
      - name: areaHa
        logicalType: number
        required: false
        description: Service area used for duration estimation.
        customProperties:
          - property: canonicalBinding
            value: {binding: task.areaHa, semanticTerm: urn:xopt:attribute:service-area, canonicalUnit: ha, quantityKind: area, planningUse: [duration-estimation]}
      - name: workQuantity
        logicalType: number
        required: false
        description: Generic work demand driving duration estimation; unit declared by workQuantityUnit.
        customProperties:
          - property: canonicalBinding
            value: {binding: task.workQuantity, semanticTerm: urn:xopt:attribute:work-quantity, quantityKind: work, planningUse: [duration-estimation]}
      - name: workQuantityUnit
        logicalType: string
        required: false
        description: Unit the work quantity counts (ha, m3, items, ...).
        customProperties:
          - property: canonicalBinding
            value: {binding: task.workQuantityUnit, semanticTerm: urn:xopt:attribute:work-quantity-unit, planningUse: [duration-estimation]}
      - name: serviceDurationMinutes
        logicalType: number
        required: false
        description: Explicit effort override; wins over any quantity-driven estimate.
        customProperties:
          - property: canonicalBinding
            value: {binding: task.serviceDurationMinutes, semanticTerm: urn:xopt:attribute:service-duration, canonicalUnit: min, quantityKind: duration, planningUse: [duration-estimation]}
      - name: loadDemand
        logicalType: number
        required: false
        description: Mass the bundle must carry to the task (delivered material).
        customProperties:
          - property: canonicalBinding
            value: {binding: task.loadDemand, semanticTerm: urn:xopt:attribute:load-demand, canonicalUnit: kg, quantityKind: mass, planningUse: [capacity]}
      - name: loadMaterial
        logicalType: string
        required: false
        description: >-
          Material code of the load demand; tasks sharing a code compete for
          the same vehicle compartment. Empty means the unspecified aggregate
          material.
        customProperties:
          - property: canonicalBinding
            value: {binding: task.loadMaterial, semanticTerm: urn:xopt:attribute:load-material, planningUse: [capacity]}
      - name: pickupLocationRef
        logicalType: string
        required: false
        description: >-
          Pickup location of a paired pickup-and-delivery task: the load is
          picked up there and dropped at the task location (same vehicle,
          pickup first). Absent means the load is carried from the depot.
        customProperties:
          - property: canonicalBinding
            value: {binding: task.pickupLocationRef, semanticTerm: urn:xopt:relationship:pickup-location, planningUse: [capacity, geospatial]}
      - name: dependsOnTaskRef
        logicalType: string
        required: false
        description: Predecessor task that must be served before this one.
        customProperties:
          - property: canonicalBinding
            value: {binding: task.dependsOnTaskRef, semanticTerm: urn:xopt:relationship:depends-on, planningUse: [precedence]}
      - name: timeWindows
        logicalType: array
        required: false
        description: Workable ISO-8601 "from/to" intervals the execution must start within.
        customProperties:
          - property: canonicalBinding
            value: {binding: task.timeWindows, semanticTerm: urn:xopt:time:workable-windows, quantityKind: interval-set, planningUse: [time-window]}
      - name: deadline
        logicalType: string
        required: false
        description: Hard time-window end (ISO-8601).
        customProperties:
          - property: canonicalBinding
            value: {binding: task.deadline, semanticTerm: urn:xopt:commitment:deadline, quantityKind: timestamp, planningUse: [time-window, commitment]}
      - name: penaltyPerDay
        logicalType: number
        required: false
        description: Penalty accrued per day the deadline is missed.
        customProperties:
          - property: canonicalBinding
            value: {binding: task.penaltyPerDay, semanticTerm: urn:xopt:commitment:lateness-penalty, canonicalUnit: EUR, quantityKind: money, planningUse: [objective, commitment]}
      - name: priorityClass
        logicalType: integer
        required: false
        description: Priority class used for objective ordering.
        customProperties:
          - property: canonicalBinding
            value: {binding: task.priorityClass, semanticTerm: urn:xopt:attribute:priority-class, planningUse: [objective]}
      - name: status
        logicalType: string
        required: false
        description: Lifecycle status used for freeze handling.
        customProperties:
          - property: canonicalBinding
            value: {binding: task.status, semanticTerm: urn:xopt:attribute:task-status, planningUse: [freeze]}
      - name: revenueValue
        logicalType: number
        required: false
        description: Expected revenue if the task is completed on time.
        customProperties:
          - property: canonicalBinding
            value: {binding: task.revenueValue, semanticTerm: urn:xopt:attribute:expected-revenue, canonicalUnit: EUR, quantityKind: money, planningUse: [objective]}
