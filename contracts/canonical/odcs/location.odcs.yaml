apiVersion: v3.0.0
kind: DataContract
id: canonical-location
version: 0.4.0
status: active
name: Canonical Location
domain: canonical
tenant: optimization
description:
  purpose: Minimal optimization contract for a point of interest (location).
  usage: Geospatial clustering, repositioning anchors, material availability.
customProperties:
  - property: canonicalEntity
    value:
      entity: location
      canonicalModelRef: urn:xopt:model:canonical:0.1.0
schema:
  - name: location
    logicalType: object
    properties:
      - name: locationId
        logicalType: string
        required: true
        description: Stable canonical identifier of the location.
        customProperties:
          - property: canonicalBinding
            value: {binding: location.locationId, semanticTerm: urn:xopt:identity:location-id, planningUse: [identity]}
      - name: name
        logicalType: string
        required: false
        description: Human-readable display name.
        customProperties:
          - property: canonicalBinding
            value: {binding: location.name, semanticTerm: urn:xopt:attribute:display-name, planningUse: [display]}
      - name: locationType
        logicalType: string
        required: false
        description: >-
          Routing role of the location (field, depot, supplier, or
          loading-station). Source mappings may alternatively declare the same
          role as assetRole metadata.
        customProperties:
          - property: canonicalBinding
            value: {binding: location.locationType, semanticTerm: urn:xopt:attribute:location-type, planningUse: [classification, routing]}
      - name: lat
        logicalType: number
        required: true
        description: Location latitude (entry point or centroid).
        customProperties:
          - property: canonicalBinding
            value: {binding: location.lat, semanticTerm: urn:xopt:attribute:latitude, canonicalUnit: deg, quantityKind: angle, planningUse: [geospatial]}
      - name: lon
        logicalType: number
        required: true
        description: Location longitude (entry point or centroid).
        customProperties:
          - property: canonicalBinding
            value: {binding: location.lon, semanticTerm: urn:xopt:attribute:longitude, canonicalUnit: deg, quantityKind: angle, planningUse: [geospatial]}
      - name: areaHa
        logicalType: number
        required: false
        description: Work-site area.
        customProperties:
          - property: canonicalBinding
            value: {binding: location.areaHa, semanticTerm: urn:xopt:attribute:area, canonicalUnit: ha, quantityKind: area, planningUse: [duration-estimation]}
      - name: polygon
        logicalType: array
        required: false
        description: Work-site boundary vertices as a list of [lat, lon] pairs.
        customProperties:
          - property: canonicalBinding
            value: {binding: location.polygon, semanticTerm: urn:xopt:attribute:polygon, quantityKind: geometry, planningUse: [geospatial]}
      - name: soilType
        logicalType: string
        required: false
        description: Ground/soil classification used for restrictions.
        customProperties:
          - property: canonicalBinding
            value: {binding: location.soilType, semanticTerm: urn:xopt:attribute:soil-type, planningUse: [field-restriction]}
      - name: restrictedOperations
        logicalType: array
        required: false
        description: Operation types prohibited at this location (restricted zone).
        customProperties:
          - property: canonicalBinding
            value: {binding: location.restrictedOperations, semanticTerm: urn:xopt:restriction:prohibited-operations, quantityKind: categorical-set, planningUse: [field-restriction]}
      - name: restrictionWindows
        logicalType: array
        required: false
        description: >-
          ISO-8601 "from/to" intervals during which no execution may start at
          this location (time-restricted area).
        customProperties:
          - property: canonicalBinding
            value: {binding: location.restrictionWindows, semanticTerm: urn:xopt:restriction:restricted-windows, quantityKind: interval-set, planningUse: [field-restriction, time-window]}
      - name: inventoryFuel
        logicalType: number
        required: false
        description: Available fuel/energy inventory at this location.
        customProperties:
          - property: canonicalBinding
            value: {binding: location.inventory.fuel, semanticTerm: urn:xopt:inventory:fuel, canonicalUnit: L, quantityKind: volume, planningUse: [material-availability]}
      - name: inventoryMaterial
        logicalType: number
        required: false
        description: Available consumable-material inventory at this location.
        customProperties:
          - property: canonicalBinding
            value: {binding: location.inventory.fertilizer, semanticTerm: urn:xopt:inventory:fertilizer, canonicalUnit: kg, quantityKind: mass, planningUse: [material-availability]}
      - name: inventoryEnergy
        logicalType: number
        required: false
        description: Available non-fuel energy inventory at this location.
        customProperties:
          - property: canonicalBinding
            value: {binding: location.inventory.energy, semanticTerm: urn:xopt:inventory:energy, canonicalUnit: kWh, quantityKind: energy, planningUse: [capacity]}
      - name: chargingPowerKw
        logicalType: number
        required: false
        description: >-
          Aggregate charger/refuel power available at this location, shared
          across its parallel bays (recharge-station scheduling).
        customProperties:
          - property: canonicalBinding
            value: {binding: location.chargingPowerKw, semanticTerm: urn:xopt:capacity:charging-power, canonicalUnit: kW, quantityKind: power, planningUse: [capacity]}
      - name: chargingSlots
        logicalType: integer
        required: false
        description: >-
          Number of parallel charging/refuelling bays at this location; bounds
          how many assets recharge at once (charging queue capacity).
        customProperties:
          - property: canonicalBinding
            value: {binding: location.chargingSlots, semanticTerm: urn:xopt:capacity:charging-slots, quantityKind: count, planningUse: [capacity]}
