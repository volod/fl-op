apiVersion: v3.0.0
kind: DataContract
id: canonical-plan
version: 1.0.0
status: active
name: Canonical Plan (output)
domain: canonical
tenant: optimization
description:
  purpose: >-
    The canonical OUTPUT contract for published plans, mirroring the input
    entity contracts: the plan/revision envelope plus its assignment,
    unassigned-task, material-reservation, score, quality-summary, and
    corrective-action records.
  usage: >-
    Produced by solver adapters (src/fl_op/canonical/plan.py) and validated on
    publication (src/fl_op/contracts/plan_contract.py). Never consumed as
    snapshot input.
customProperties:
  - property: canonicalEntity
    value:
      entity: plan
      canonicalModelRef: urn:xopt:model:canonical:0.1.0
      # Output entity: validated against produced plan artifacts, not mapped
      # from domain sources.
schema:
  - name: plan
    logicalType: object
    properties:
      - name: planId
        logicalType: string
        required: true
        description: Stable identifier of the plan.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.planId, semanticTerm: urn:xopt:identity:plan-id, planningUse: [identity]}
      - name: revisionId
        logicalType: string
        required: true
        description: Immutable revision identifier; rolling updates create new revisions.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.revisionId, semanticTerm: urn:xopt:identity:revision-id, planningUse: [identity]}
      - name: parentRevisionId
        logicalType: string
        required: false
        description: Predecessor revision in a rolling chain; absent for a baseline.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.parentRevisionId, semanticTerm: urn:xopt:identity:revision-id, planningUse: [lineage]}
      - name: snapshotRef
        logicalType: string
        required: true
        description: Planning snapshot the plan was solved from.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.snapshotRef, semanticTerm: urn:xopt:identity:snapshot-id, planningUse: [lineage]}
      - name: planningMode
        logicalType: string
        required: true
        description: Planning mode (periodic, rolling).
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.planningMode, semanticTerm: urn:xopt:plan:planning-mode, planningUse: [classification]}
      - name: status
        logicalType: string
        required: true
        description: Plan lifecycle status (draft, approved, published, superseded, rejected).
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.status, semanticTerm: urn:xopt:plan:status, planningUse: [lifecycle]}
      - name: generatedAt
        logicalType: string
        required: true
        description: Wall-clock the plan was produced (ISO-8601).
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.generatedAt, semanticTerm: urn:xopt:time:generated-at, quantityKind: timestamp, planningUse: [lineage]}
      - name: effectiveFrom
        logicalType: string
        required: true
        description: Start of the interval the plan governs (ISO-8601).
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.effectiveFrom, semanticTerm: urn:xopt:time:valid-from, quantityKind: timestamp, planningUse: [time-window]}
      - name: effectiveTo
        logicalType: string
        required: false
        description: End of the interval the plan governs (ISO-8601).
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.effectiveTo, semanticTerm: urn:xopt:time:valid-to, quantityKind: timestamp, planningUse: [time-window]}
  - name: assignment
    logicalType: object
    properties:
      - name: assignmentId
        logicalType: string
        required: true
        description: Stable identifier of the assignment record.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.assignment.assignmentId, semanticTerm: urn:xopt:identity:assignment-id, planningUse: [identity]}
      - name: taskRef
        logicalType: string
        required: true
        description: Task the bundle is assigned to.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.assignment.taskRef, semanticTerm: urn:xopt:relationship:task, planningUse: [assignment]}
      - name: assetRefs
        logicalType: array
        required: false
        description: Assets of the executing bundle (prime mover, related equipment).
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.assignment.assetRefs, semanticTerm: urn:xopt:relationship:entity-refs, quantityKind: categorical-set, planningUse: [assignment]}
      - name: operatorRefs
        logicalType: array
        required: false
        description: Operators executing the assignment.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.assignment.operatorRefs, semanticTerm: urn:xopt:relationship:entity-refs, quantityKind: categorical-set, planningUse: [assignment]}
      - name: plannedStart
        logicalType: string
        required: true
        description: Scheduled execution start (ISO-8601).
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.assignment.plannedStart, semanticTerm: urn:xopt:time:planned-start, quantityKind: timestamp, planningUse: [time-window]}
      - name: plannedFinish
        logicalType: string
        required: true
        description: Scheduled execution end (ISO-8601).
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.assignment.plannedFinish, semanticTerm: urn:xopt:time:planned-end, quantityKind: timestamp, planningUse: [time-window]}
      - name: expectedRevenue
        logicalType: number
        required: false
        description: Expected revenue of the assignment.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.assignment.expectedRevenue, semanticTerm: urn:xopt:attribute:expected-revenue, canonicalUnit: EUR, quantityKind: money, planningUse: [objective]}
      - name: expectedCost
        logicalType: number
        required: false
        description: Expected execution cost of the assignment.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.assignment.expectedCost, semanticTerm: urn:xopt:plan:expected-cost, canonicalUnit: EUR, quantityKind: money, planningUse: [objective]}
      - name: expectedMargin
        logicalType: number
        required: false
        description: Expected margin of the assignment.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.assignment.expectedMargin, semanticTerm: urn:xopt:plan:expected-margin, canonicalUnit: EUR, quantityKind: money, planningUse: [objective]}
  - name: unassignedTask
    logicalType: object
    properties:
      - name: taskRef
        logicalType: string
        required: true
        description: Task that could not be assigned.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.unassignedTask.taskRef, semanticTerm: urn:xopt:relationship:task, planningUse: [assignment]}
      - name: reasonCode
        logicalType: string
        required: true
        description: Normalized canonical reason code for the exclusion.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.unassignedTask.reasonCode, semanticTerm: urn:xopt:plan:reason-code, planningUse: [explanation]}
  - name: materialReservation
    logicalType: object
    properties:
      - name: reservationId
        logicalType: string
        required: true
        description: Stable identifier of the reservation record.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.materialReservation.reservationId, semanticTerm: urn:xopt:identity:reservation-id, planningUse: [identity]}
      - name: taskRef
        logicalType: string
        required: true
        description: Task the material is reserved for.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.materialReservation.taskRef, semanticTerm: urn:xopt:relationship:task, planningUse: [assignment]}
      - name: materialType
        logicalType: string
        required: true
        description: Canonical material code reserved.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.materialReservation.materialType, semanticTerm: urn:xopt:inventory:material-type, planningUse: [material-availability]}
      - name: inventoryLocationRef
        logicalType: string
        required: true
        description: Location whose inventory the reservation draws from.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.materialReservation.inventoryLocationRef, semanticTerm: urn:xopt:relationship:location, planningUse: [material-availability]}
      - name: quantity
        logicalType: number
        required: true
        description: Reserved quantity, in the record's canonical unit.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.materialReservation.quantity, semanticTerm: urn:xopt:inventory:quantity, quantityKind: measurement, planningUse: [material-availability]}
      - name: status
        logicalType: string
        required: true
        description: Reservation lifecycle status (provisional, confirmed, consumed, released).
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.materialReservation.status, semanticTerm: urn:xopt:plan:reservation-status, planningUse: [lifecycle]}
  - name: score
    logicalType: object
    properties:
      - name: optimizationObjective
        logicalType: string
        required: false
        description: Objective mode used for the solve.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.score.optimizationObjective, semanticTerm: urn:xopt:plan:optimization-objective, planningUse: [objective]}
      - name: totalEstimatedMarginEur
        logicalType: number
        required: false
        description: Total estimated margin across assigned work.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.score.totalEstimatedMarginEur, semanticTerm: urn:xopt:plan:margin-score, canonicalUnit: EUR, quantityKind: money, planningUse: [objective]}
      - name: greedyBaselineMarginEur
        logicalType: number
        required: false
        description: Margin of the greedy warm-start baseline.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.score.greedyBaselineMarginEur, semanticTerm: urn:xopt:plan:margin-score, canonicalUnit: EUR, quantityKind: money, planningUse: [objective]}
      - name: solverImprovementEur
        logicalType: number
        required: false
        description: Solver margin improvement over the greedy baseline.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.score.solverImprovementEur, semanticTerm: urn:xopt:plan:margin-score, canonicalUnit: EUR, quantityKind: money, planningUse: [objective]}
      - name: totalCompletionTimeS
        logicalType: number
        required: false
        description: Sum of assignment completion times.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.score.totalCompletionTimeS, semanticTerm: urn:xopt:plan:completion-time-score, canonicalUnit: s, quantityKind: duration, planningUse: [objective]}
      - name: avgCompletionTimeS
        logicalType: number
        required: false
        description: Mean assignment completion time.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.score.avgCompletionTimeS, semanticTerm: urn:xopt:plan:completion-time-score, canonicalUnit: s, quantityKind: duration, planningUse: [objective]}
      - name: p95CompletionTimeS
        logicalType: number
        required: false
        description: P95 assignment completion time.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.score.p95CompletionTimeS, semanticTerm: urn:xopt:plan:completion-time-score, canonicalUnit: s, quantityKind: duration, planningUse: [objective]}
      - name: maxCompletionTimeS
        logicalType: number
        required: false
        description: Maximum assignment completion time.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.score.maxCompletionTimeS, semanticTerm: urn:xopt:plan:completion-time-score, canonicalUnit: s, quantityKind: duration, planningUse: [objective]}
      - name: nDispatched
        logicalType: integer
        required: false
        description: Number of tasks assigned in the plan.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.score.nDispatched, semanticTerm: urn:xopt:plan:assignment-count, planningUse: [quality]}
      - name: nUnassigned
        logicalType: integer
        required: false
        description: Number of tasks left unassigned in the plan.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.score.nUnassigned, semanticTerm: urn:xopt:plan:assignment-count, planningUse: [quality]}
      - name: nClusters
        logicalType: integer
        required: false
        description: Number of solver clusters considered.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.score.nClusters, semanticTerm: urn:xopt:plan:cluster-count, planningUse: [solver-quality]}
      - name: planInstabilityPenalty
        logicalType: integer
        required: false
        description: Rolling-plan change penalty applied after freeze.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.score.planInstabilityPenalty, semanticTerm: urn:xopt:plan:instability-penalty, planningUse: [solver-quality]}
  - name: qualitySummary
    logicalType: object
    properties:
      - name: nFindings
        logicalType: integer
        required: true
        description: Number of data-quality findings reflected in the plan.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.qualitySummary.nFindings, semanticTerm: urn:xopt:quality:finding-count, planningUse: [quality]}
      - name: nEntitiesExcluded
        logicalType: integer
        required: true
        description: Number of source entities excluded by quality policy.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.qualitySummary.nEntitiesExcluded, semanticTerm: urn:xopt:quality:entities-excluded, planningUse: [quality]}
      - name: nImputed
        logicalType: integer
        required: true
        description: Number of source values imputed by quality policy.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.qualitySummary.nImputed, semanticTerm: urn:xopt:quality:imputed-count, planningUse: [quality]}
      - name: bySeverity
        logicalType: object
        required: false
        description: Quality finding counts by severity.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.qualitySummary.bySeverity, semanticTerm: urn:xopt:quality:severity-counts, planningUse: [quality]}
      - name: observationErrorRates
        logicalType: object
        required: false
        description: Bad-reading share by source observation contract.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.qualitySummary.observationErrorRates, semanticTerm: urn:xopt:quality:observation-error-rates, planningUse: [quality]}
  - name: correctiveAction
    logicalType: object
    properties:
      - name: action
        logicalType: string
        required: true
        description: Corrective action type applied by rolling planning.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.correctiveAction.action, semanticTerm: urn:xopt:plan:corrective-action, planningUse: [explanation]}
      - name: taskRef
        logicalType: string
        required: true
        description: Task affected by the corrective action.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.correctiveAction.taskRef, semanticTerm: urn:xopt:relationship:task, planningUse: [explanation]}
      - name: detail
        logicalType: string
        required: false
        description: Human-readable action detail.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.correctiveAction.detail, semanticTerm: urn:xopt:plan:evidence, planningUse: [explanation]}
      - name: evidence
        logicalType: object
        required: false
        description: Machine-readable evidence for the correction.
        customProperties:
          - property: canonicalBinding
            value: {binding: plan.correctiveAction.evidence, semanticTerm: urn:xopt:plan:evidence, planningUse: [explanation]}
