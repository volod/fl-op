# Contract-suite and test CI.
#
# Physical schemas (Avro, Proto, ES, Parquet descriptors) are generated from
# the ODCS contracts before validation runs, so a stale generated schema can
# never pass unnoticed. The schema-evolution gate then enforces the
# version-bump policy against the committed baselines under
# contracts/evolution/, and the test suite runs last.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create environment
        run: make venv

      - name: Generate schemas, validate contracts, run tests
        run: make ci
